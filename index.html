<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITC Games Studio</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #070810;
      --surface: #0d0f1a;
      --card: #111422;
      --orange: #ff6a00;
      --orange2: #ff9d00;
      --text: #f0f2ff;
      --muted: #5a6080;
      --border: rgba(255, 255, 255, 0.06);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Be Vietnam Pro', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 1;
    }

    /* NAVBAR */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 64px;
      background: rgba(7, 8, 16, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      letter-spacing: 3px;
      background: linear-gradient(90deg, var(--orange), var(--orange2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo span {
      background: linear-gradient(90deg, #fff, #aab);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    nav {
      display: flex;
      gap: 4px;
    }

    nav a {
      text-decoration: none;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
      transition: all .2s;
      letter-spacing: 0.3px;
    }

    nav a:hover,
    nav a.active {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
    }

    nav a.active {
      color: var(--orange);
    }

    @media (max-width: 768px) {
      .navbar {
        padding: 0 20px;
      }

      nav {
        display: none;
      }
    }

    /* MAIN */
    .main {
      position: relative;
      z-index: 2;
      padding: 0 48px 80px;
      max-width: 1440px;
      margin: 0 auto;
    }

    @media (max-width: 768px) {
      .main {
        padding: 0 16px 60px;
      }
    }

    /* HERO */
    .hero {
      position: relative;
      margin: 40px 0 64px;
      border-radius: 24px;
      overflow: hidden;
      height: 320px;
      display: flex;
      align-items: center;
      padding: 48px;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a0800 0%, #0d0810 50%, #000d1a 100%);
      z-index: 0;
    }

    .hero-bg::before {
      content: '';
      position: absolute;
      top: -60px;
      left: -60px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255, 106, 0, 0.22) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulseGlow 4s ease-in-out infinite;
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      bottom: -80px;
      right: 80px;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulseGlow 6s ease-in-out infinite reverse;
    }

    @keyframes pulseGlow {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.2);
        opacity: 0.7;
      }
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 106, 0, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 106, 0, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 520px;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 16px;
    }

    .hero-eyebrow::before {
      content: '';
      width: 24px;
      height: 2px;
      background: var(--orange);
    }

    .hero h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(48px, 5.5vw, 76px);
      line-height: 0.92;
      letter-spacing: 2px;
      margin-bottom: 16px;
      color: #fff;
    }

    .hero h1 span {
      background: linear-gradient(90deg, var(--orange), var(--orange2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .hero-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-store {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 13px;
      font-weight: 600;
      transition: all .2s;
      text-decoration: none;
    }

    .btn-android {
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      color: #000;
      box-shadow: 0 4px 20px rgba(255, 106, 0, 0.35);
    }

    .btn-android:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255, 106, 0, 0.5);
    }

    .btn-ios {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .btn-ios:hover {
      background: rgba(255, 255, 255, 0.14);
      transform: translateY(-2px);
    }

    /* SECTION */
    .section {
      margin-bottom: 64px;
    }

    .section-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 6px;
    }

    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 34px;
      letter-spacing: 2px;
      color: #fff;
      line-height: 1;
    }

    .section-count {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, var(--orange), transparent);
      margin-bottom: 32px;
      opacity: 0.3;
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 4px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      padding: 4px;
      width: fit-content;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }

    .tab {
      padding: 8px 20px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      transition: all .2s;
      border: none;
      background: none;
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      color: #000;
    }

    .tab:not(.active):hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
    }

    /* STORE CARDS */
    .store-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }

    .store-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .25s, box-shadow .25s;
      border: 1px solid var(--border);
      position: relative;
    }

    .store-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255, 106, 0, 0.07), transparent);
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }

    .store-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 106, 0, 0.2);
    }

    .store-card:hover::before {
      opacity: 1;
    }

    .store-card .thumb {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
      background: #0a0c14;
    }

    .store-card-body {
      padding: 16px 18px 18px;
    }

    .store-card h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .store-card .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .store-links {
      display: flex;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-decoration: none;
      transition: all .2s;
      cursor: pointer;
      border: none;
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    .pill-android {
      background: rgba(255, 106, 0, 0.12);
      color: var(--orange2);
      border: 1px solid rgba(255, 106, 0, 0.2);
    }

    .pill-android:hover {
      background: rgba(255, 106, 0, 0.22);
      transform: scale(1.03);
    }

    .pill-ios {
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .pill-ios:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    /* GAME CARDS */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .game-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .25s, box-shadow .25s;
      border: 1px solid var(--border);
      position: relative;
    }

    .game-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 106, 0, 0.15);
    }

    /* glare sweep */
    .game-card::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -75%;
      width: 50%;
      height: 200%;
      background: linear-gradient(105deg, transparent 40%, rgba(255, 255, 255, 0.06) 50%, transparent 60%);
      transform: skewX(-15deg);
      transition: left .5s ease;
      pointer-events: none;
    }

    .game-card:hover::after {
      left: 125%;
    }

    .game-card .thumb {
      width: 100%;
      height: 148px;
      object-fit: cover;
      display: block;
      background: #0a0c14;
    }

    .game-category {
      position: absolute;
      top: 12px;
      left: 12px;
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      color: #000;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .game-card-body {
      padding: 16px;
    }

    .game-card h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .game-card .desc {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .stars {
      color: #f59e0b;
      font-size: 13px;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .25s;
      border-radius: 16px;
    }

    .play-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 20px;
      box-shadow: 0 0 30px rgba(255, 106, 0, 0.6);
      transform: scale(0.8);
      transition: transform .2s;
    }

    .game-card:hover .play-overlay {
      opacity: 1;
    }

    .game-card:hover .play-btn {
      transform: scale(1);
    }

    /* FOOTER */
    footer {
      position: relative;
      z-index: 2;
      border-top: 1px solid var(--border);
      padding: 32px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      color: var(--orange);
    }

    .footer-copy {
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      footer {
        padding: 24px 20px;
        flex-direction: column;
        gap: 12px;
        text-align: center;
      }
    }

    /* SCROLL REVEAL */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .6s ease, transform .6s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: none;
    }

    .reveal-children>* {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity .5s ease, transform .5s ease;
    }

    .reveal-children.visible>*:nth-child(1) {
      opacity: 1;
      transform: none;
      transition-delay: 0s
    }

    .reveal-children.visible>*:nth-child(2) {
      opacity: 1;
      transform: none;
      transition-delay: .07s
    }

    .reveal-children.visible>*:nth-child(3) {
      opacity: 1;
      transform: none;
      transition-delay: .14s
    }

    .reveal-children.visible>*:nth-child(4) {
      opacity: 1;
      transform: none;
      transition-delay: .21s
    }

    .reveal-children.visible>*:nth-child(5) {
      opacity: 1;
      transform: none;
      transition-delay: .28s
    }

    .reveal-children.visible>*:nth-child(6) {
      opacity: 1;
      transform: none;
      transition-delay: .35s
    }

    .reveal-children.visible>*:nth-child(7) {
      opacity: 1;
      transform: none;
      transition-delay: .42s
    }

    .reveal-children.visible>*:nth-child(8) {
      opacity: 1;
      transform: none;
      transition-delay: .49s
    }

    .empty {
      grid-column: 1/-1;
      text-align: center;
      color: var(--muted);
      padding: 40px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <canvas id="stars"></canvas>

  <header class="navbar">
    <div class="logo">ITC<span> Games</span></div>
    <nav>
      <a href="#" class="active">Trang chủ</a>
      <a href="#store">Phát hành</a>
      <a href="#demo">Demo</a>
    </nav>
    <div style="width:120px"></div>
  </header>

  <div class="main">

    <div class="hero reveal">
      <div class="hero-bg"></div>
      <div class="hero-grid"></div>
      <div class="hero-content">
        <div class="hero-eyebrow">ITC Game Studio</div>
        <h1>ARCANE<br><span>HUNTER</span></h1>
        <p>Soul Survivor — Action RPG sinh tồn đỉnh cao.<br>Chiến đấu, tiến hóa, chinh phục.</p>
        <div class="hero-btns">
          <a class="btn-store btn-android"
            href="https://play.google.com/store/apps/details?id=com.itcgamestudio.arcane.hunter.soul.survivor.monster.action.shooter.rpg"
            target="_blank">▶ Google Play</a>
          <a class="btn-store btn-ios" href="https://apps.apple.com/vn/app/arcane-hunter-soul-survivor/id6740374474"
            target="_blank"> App Store</a>
        </div>
      </div>
    </div>

    <section class="section" id="store">
      <div class="section-header reveal">
        <div>
          <div class="section-label">Sản phẩm</div>
          <div class="section-title">Đã Phát Hành</div>
        </div>
        <span class="section-count" id="store-count"></span>
      </div>
      <div class="divider"></div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('android',this)">🤖 Android</button>
        <button class="tab" onclick="switchTab('ios',this)">🍎 iOS</button>
      </div>
      <div class="store-grid reveal-children" id="storeGrid"></div>
    </section>

    <section class="section" id="demo">
      <div class="section-header reveal">
        <div>
          <div class="section-label">Web Demo</div>
          <div class="section-title">Chơi Thử Ngay</div>
        </div>
        <span class="section-count" id="demo-count"></span>
      </div>
      <div class="divider"></div>
      <div class="game-grid reveal-children" id="gameGrid"></div>
    </section>

  </div>

  <footer>
    <div class="footer-logo">ITC Games</div>
    <div class="footer-copy">© 2025 ITC Game Studio · All rights reserved.</div>
  </footer>

  <script>
    /* Stars */
    (function () {
      const c = document.getElementById('stars'), ctx = c.getContext('2d');
      let W, H, s = [];
      function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
      function init() { s = Array.from({ length: 130 }, () => ({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.2 + 0.2, a: Math.random(), sp: Math.random() * 0.004 + 0.002, ph: Math.random() * Math.PI * 2 })); }
      function draw(t) {
        ctx.clearRect(0, 0, W, H);
        s.forEach(p => { p.a = 0.25 + 0.5 * Math.sin(t * p.sp + p.ph); ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(200,210,255,${p.a})`; ctx.fill(); });
        requestAnimationFrame(draw);
      }
      window.addEventListener('resize', () => { resize(); init() });
      resize(); init(); requestAnimationFrame(draw);
    })();

    /* Scroll reveal */
    const obs = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible') }), { threshold: 0.1 });
    document.querySelectorAll('.reveal,.reveal-children').forEach(el => obs.observe(el));

    /* Data */
    let allStore = [], currentPlatform = 'android';

    async function loadGames() {
      try {
        const [sr, gr] = await Promise.all([fetch('games_store.json'), fetch('games.json')]);
        const raw = await sr.json();
        const games = await gr.json();
        const seen = new Set();
        allStore = raw.filter(g => { if (seen.has(g.id)) return false; seen.add(g.id); return true; });
        document.getElementById('store-count').textContent = allStore.length + ' sản phẩm';
        document.getElementById('demo-count').textContent = games.length + ' game';
        renderStore('android');
        renderDemos(games);
      } catch (e) { console.error(e); }
    }

    function renderStore(platform) {
      const el = document.getElementById('storeGrid');
      el.innerHTML = ''; el.classList.remove('visible');
      //const list = allStore.filter(g => platform==='android' ? g.link_android : g.link_ios);
      const list = allStore.filter(g =>
        platform === 'android' ? !!g.link_android : !!g.link_ios
      );
      if (!list.length) { el.innerHTML = '<div class="empty">Chưa có sản phẩm trên nền tảng này.</div>'; return; }
      list.forEach(g => {
        const link = platform === 'android' ? g.link_android : g.link_ios;
        const d = document.createElement('div');
        d.className = 'store-card';
        d.innerHTML = `
          <img class="thumb" src="${g.thumbnail || ''}" alt="${g.name || ''}">
          <div class="store-card-body">
            <div class="tag">🎮 ITC Studio</div>
            <h3>${g.name}</h3>
            <div class="store-links">
              ${platform === 'android'
            ? `<button class="pill pill-android" onclick="window.open('${g.link_android}','_blank')">▶ Google Play</button>`
            : `<button class="pill pill-ios" onclick="window.open('${g.link_ios}','_blank')"> App Store</button>`}
            </div>
          </div>`;
        el.appendChild(d);
      });
      requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
    }

    function renderDemos(list) {
      const el = document.getElementById('gameGrid');
      el.innerHTML = '';
      if (!list.length) { el.innerHTML = '<div class="empty">Chưa có demo.</div>'; return; }
      list.forEach(g => {
        const d = document.createElement('div');
        d.className = 'game-card';
        d.onclick = () => { window.location.href = 'play.html?id=' + g.id; };
        d.innerHTML = `
          <img class="thumb" src="${g.thumbnail || ''}" alt="${g.name || ''}">
          <div class="game-category">${g.category || 'Game'}</div>
          <div class="play-overlay"><div class="play-btn">▶</div></div>
          <div class="game-card-body">
            <h3>${g.name}</h3>
            <div class="desc">${g.description || 'Nhấn để chơi demo trực tiếp trên trình duyệt.'}</div>
            <div class="stars">${'⭐'.repeat(Math.floor(g.rating || 4.5))} <span style="color:var(--muted);font-size:12px;">${g.rating || 4.5}</span></div>
          </div>`;
        el.appendChild(d);
      });
    }

    function switchTab(platform, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderStore(platform);
    }

    loadGames();
  </script>
</body>

</html>
