<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player | Tower_Defense</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    #custom-loading-screen {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      transition: opacity 0.6s ease;
    }

    #custom-loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #f5a623, #e8432d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .loading-subtitle {
      font-size: 12px;
      letter-spacing: 2px;
      color: #666;
      margin-bottom: 48px;
      text-transform: uppercase;
    }

    .game-icon {
      width: 80px;
      height: 80px;
      margin-bottom: 40px;
    }

    .game-icon svg {
      width: 100%;
      height: 100%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.08);
        opacity: .85;
      }
    }

    .progress-container {
      width: 320px;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .progress-stage {
      font-size: 11px;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .progress-percent {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      font-variant-numeric: tabular-nums;
      min-width: 52px;
      text-align: right;
    }

    .progress-track {
      width: 100%;
      height: 4px;
      background: #1e1e2e;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #e8432d, #f5a623);
      border-radius: 2px;
      transition: width 0.25s ease;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      animation: shimmer 1.5s ease infinite;
    }

    @keyframes shimmer {
      0% {
        left: -100%;
      }

      100% {
        left: 100%;
      }
    }

    .steps {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      align-items: center;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #444;
      transition: color 0.4s;
    }

    .step.done {
      color: #4caf50;
    }

    .step.active {
      color: #f5a623;
    }

    .step-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #333;
      transition: background 0.4s;
      flex-shrink: 0;
    }

    .step.done .step-dot {
      background: #4caf50;
    }

    .step.active .step-dot {
      background: #f5a623;
      animation: blink 0.8s ease infinite alternate;
    }

    @keyframes blink {
      from {
        opacity: 1;
      }

      to {
        opacity: 0.3;
      }
    }

    .step-sep {
      width: 16px;
      height: 1px;
      background: #333;
    }

    .size-info {
      margin-top: 14px;
      font-size: 11px;
      color: #555;
      font-variant-numeric: tabular-nums;
      min-height: 16px;
    }

    .tip-box {
      margin-top: 36px;
      text-align: center;
      max-width: 300px;
    }

    .tip-label {
      font-size: 10px;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .tip-text {
      font-size: 13px;
      color: #777;
      line-height: 1.6;
      min-height: 40px;
      transition: opacity 0.4s;
    }
  </style>
</head>

<body>
  <div id="custom-loading-screen">
    <!-- <div class="game-icon"> -->
    <img src="TemplateData/Logo.png" alt="Logo" width="400" style="margin-top: -80px; margin-bottom: 100px;">
    <!-- </div> -->
    <div class="loading-title">Pet vs Monster</div>
    <!-- <div class="loading-subtitle">Pet vs Monster</div> -->
    <div class="progress-container">
      <div class="progress-labels">
        <span class="progress-stage" id="stage-label">Đang khởi động...</span>
        <span class="progress-percent" id="pct-label">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="steps">
        <div class="step active" id="step-download">
          <div class="step-dot"></div>Download
        </div>
        <div class="step-sep"></div>
        <div class="step" id="step-compile">
          <div class="step-dot"></div>Compile
        </div>
        <div class="step-sep"></div>
        <div class="step" id="step-init">
          <div class="step-dot"></div>Init
        </div>
      </div>
      <div class="size-info" id="size-info"></div>
    </div>
    <!-- <div class="tip-box">
        <div class="tip-label">💡 Tip</div>
        <div class="tip-text" id="tip-text">Đặt tower ở vị trí chiến lược để chặn nhiều làn đường nhất!</div>
      </div> -->
  </div>

  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width=600 height=960 tabindex="-1"></canvas>
    <div id="unity-loading-bar" style="display:none">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"></div>
    <div id="unity-footer">
      <div id="unity-webgl-logo"></div>
      <div id="unity-fullscreen-button"></div>
      <div id="unity-build-title">Tower_Defense</div>
    </div>
  </div>

  <script>
    // ── Tips ─────────────────────────────────────────────────────────────────
    const tips = [
      "Đặt tower ở vị trí chiến lược để chặn nhiều làn đường nhất!",
      "Nâng cấp tower sớm để tăng sức mạnh hiệu quả hơn.",
      "Kết hợp nhiều loại tower khác nhau để tối ưu damage.",
      "Theo dõi loại kẻ địch để chọn tower phù hợp nhất.",
      "Giữ vàng để ứng phó với các wave khó phía sau.",
    ];
    let tipIdx = 0;
    const tipEl = document.getElementById('tip-text');
    setInterval(() => {
      tipEl.style.opacity = 0;
      setTimeout(() => { tipEl.textContent = tips[++tipIdx % tips.length]; tipEl.style.opacity = 1; }, 400);
    }, 4000);

    // ── UI helpers ────────────────────────────────────────────────────────────
    const fillEl = document.getElementById('progress-fill');
    const pctEl = document.getElementById('pct-label');
    const stageEl = document.getElementById('stage-label');
    const sizeEl = document.getElementById('size-info');
    const stepDl = document.getElementById('step-download');
    const stepCo = document.getElementById('step-compile');
    const stepIn = document.getElementById('step-init');
    let _pct = 0;

    function setProgress(pct, label, sizeText) {
      _pct = Math.max(_pct, Math.min(100, pct));
      fillEl.style.width = _pct + '%';
      pctEl.textContent = Math.round(_pct) + '%';
      if (label !== undefined) stageEl.textContent = label;
      if (sizeText !== undefined) sizeEl.textContent = sizeText;
    }
    function setStep(which) {
      [stepDl, stepCo, stepIn].forEach((s, i, arr) => {
        s.classList.remove('done', 'active');
        if (i < arr.indexOf(which)) s.classList.add('done');
        if (s === which) s.classList.add('active');
      });
    }
    function fmtMB(b) { return (b / 1048576).toFixed(1) + ' MB'; }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // TRACK DOWNLOADING TỪ dataUrl
    // Cách hoạt động:
    //   1. Ta tự fetch() URL đó trước với ReadableStream để đếm bytes chính xác.
    //   2. Dữ liệu được ghép thành Blob rồi tạo blob:// URL.
    //   3. Truyền blob:// URL vào config.dataUrl → Unity load từ RAM, không fetch lại.
    //   Không có CORS issue vì ta fetch cùng URL mà Unity sẽ fetch, server đã cho phép.
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    const DATA_URL = "https://game-asset-proxy.daoquang-nvm.workers.dev/PetVsMonster.data.unityweb";

    async function downloadWithProgress(url) {
      setStep(stepDl);
      setProgress(0, 'Loading...', 'Connecting...');

      // Lấy tổng dung lượng trước bằng HEAD request
      let total = 0;
      try {
        const head = await fetch(url, { method: 'HEAD' });
        const cl = head.headers.get('Content-Length');
        if (cl) total = parseInt(cl, 10);
      } catch (_) { }

      // Hiện tổng dung lượng ngay từ đầu
      if (total) sizeEl.textContent = '0 MB / ' + fmtMB(total);

      const response = await fetch(url);
      if (!response.ok) throw new Error('HTTP ' + response.status);

      // Nếu HEAD không có Content-Length, thử lấy từ GET response
      if (!total) {
        const cl = response.headers.get('Content-Length');
        if (cl) total = parseInt(cl, 10);
      }

      const reader = response.body.getReader();
      const chunks = [];
      let received = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.length;

        const sizeText = total
          ? fmtMB(received) + ' / ' + fmtMB(total)   // "10.2 MB / 85.0 MB"
          : fmtMB(received) + ' downloaded';

        const pct = total
          ? (received / total) * 70
          : Math.min(65, _pct + 0.15);

        setProgress(pct, 'Loading...', sizeText);
      }

      const merged = new Uint8Array(received);
      let offset = 0;
      for (const c of chunks) { merged.set(c, offset); offset += c.length; }

      setProgress(70, 'Loading Done!', fmtMB(received) + ' / ' + fmtMB(received));
      setStep(stepCo);

      return URL.createObjectURL(new Blob([merged]));
    }

    // ── Unity standard setup ──────────────────────────────────────────────────
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      function upd() { warningBanner.style.display = warningBanner.children.length ? 'block' : 'none'; }
      var div = document.createElement('div'); div.innerHTML = msg; warningBanner.appendChild(div);
      if (type === 'error') div.style = 'background:red;padding:10px';
      else { if (type === 'warning') div.style = 'background:yellow;padding:10px'; setTimeout(() => { warningBanner.removeChild(div); upd(); }, 5000); }
      upd();
    }

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
      container.className = "unity-mobile"; canvas.className = "unity-mobile";
    } else {
      canvas.style.width = "600px"; canvas.style.height = "960px";
    }

    // ── Main: download → boot Unity ───────────────────────────────────────────
    (async () => {
      try {
        // Bước 1: Tự download và track progress
        const blobUrl = await downloadWithProgress(DATA_URL);

        // Bước 2: Load Unity loader script
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = "Build/PetVsMonster.loader.js";
          s.onload = resolve; s.onerror = reject;
          document.body.appendChild(s);
        });

        // Bước 3: Khởi động Unity với blob URL (không download lại)
        setStep(stepIn);
        const config = {
          dataUrl: blobUrl,   // ← dùng blob:// thay vì URL gốc
          frameworkUrl: "Build/PetVsMonster.framework.js.unityweb",
          codeUrl: "Build/PetVsMonster.wasm.unityweb",
          streamingAssetsUrl: "StreamingAssets",
          companyName: "DefaultCompany",
          productName: "Tower_Defense",
          productVersion: "0.0.15",
          showBanner: unityShowBanner,
        };

        const unityInstance = await createUnityInstance(canvas, config, (p) => {
          // Unity callback: compile + init wasm → 70→100%
          setProgress(70 + p * 30, 'Init...', '');
        });

        // Bước 4: Xong, hiện game
        setProgress(100, 'Ready!', '');
        [stepDl, stepCo, stepIn].forEach(s => { s.classList.add('done'); s.classList.remove('active'); });
        URL.revokeObjectURL(blobUrl);

        setTimeout(() => {
          const screen = document.getElementById('custom-loading-screen');
          screen.classList.add('fade-out');
          setTimeout(() => screen.remove(), 700);
        }, 300);

        fullscreenButton.onclick = () => unityInstance.SetFullscreen(1);

      } catch (err) {
        stageEl.textContent = '⚠ Error loading game';
        stageEl.style.color = '#e8432d';
        sizeEl.textContent = err.message || 'Please reload the page.';
        console.error(err);
      }
    })();
  </script>
</body>

</html>
